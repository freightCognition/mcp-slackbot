# Lint + test gate. Runs on pull requests and on branch pushes (except master,
# which is covered by the deploy workflow's `verify` job that calls this one).
# Also exposed via `workflow_call` so deploy-self-hosted.yml can require it.
name: CI

on:
  pull_request:
  push:
    branches-ignore: [master]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test
