name: Build and Push

on:
  push:
    branches: [socket-mode]
    tags: ["v*"]

jobs:
  build-and-push:
    runs-on: mcp-slackbot-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: docker build -t docker.linehaul.cloud/mcp-slackbot:${{ steps.tag.outputs.tag }} .

      - name: Tag latest on version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: docker tag docker.linehaul.cloud/mcp-slackbot:${{ steps.tag.outputs.tag }} docker.linehaul.cloud/mcp-slackbot:latest

      - name: Push
        run: |
          docker push docker.linehaul.cloud/mcp-slackbot:${{ steps.tag.outputs.tag }}
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            docker push docker.linehaul.cloud/mcp-slackbot:latest
          fi
